events {
    worker_connections 1024;
}

http {
    # ── Rate limiting ──────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;

    # ── HTTP ───────────────────────────────────────────────────────────────────
    # Serves certbot challenges and redirects everything else to HTTPS.
    # During initial SSL setup, this is the only active block.
    server {
        listen 80;
        server_name _;

        # Certbot challenge (needed to obtain the SSL certificate)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other traffic to HTTPS
        # Comment out this block until you have a valid SSL certificate
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ──────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name api.royalautoclub.org;

        ssl_certificate     /etc/letsencrypt/live/api.royalautoclub.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.royalautoclub.org/privkey.pem;

        # Modern SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;

        location / {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://server:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }
    }
}
